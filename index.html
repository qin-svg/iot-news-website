<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT资讯 - 物联网工程专业门户</title>
<style id="dynamicStyles"></style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--text-color);background:var(--body-bg);line-height:1.6}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* 导航栏 */
.navbar{position:fixed;top:0;width:100%;z-index:1000;background:var(--nav-bg);box-shadow:var(--nav-shadow);transition:all .3s}
.navbar.scrolled{background:rgba(0,0,0,.92);backdrop-filter:blur(12px)}
.nav-container{max-width:var(--content-max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 var(--section-padding);height:var(--nav-height)}
.nav-logo{display:flex;align-items:center;gap:10px;color:var(--nav-text);font-size:20px;font-weight:700;letter-spacing:1px}
.nav-logo .logo-icon{width:36px;height:36px;background:var(--accent-gradient);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-logo img.logo-img{width:36px;height:36px;border-radius:8px;object-fit:cover}
.nav-links{display:flex;gap:4px}
.nav-links a{color:var(--nav-text);padding:8px 18px;border-radius:6px;transition:all .3s;font-size:15px;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--nav-active-text);background:var(--nav-hover-bg)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px}
.hamburger span{width:24px;height:2px;background:var(--nav-text);transition:all .3s}
.scroll-indicator{position:fixed;top:var(--nav-height);left:0;height:3px;background:var(--accent-gradient);z-index:999;transition:width .1s linear}

/* 全屏区块 */
.full-section{width:100%;min-height:100vh;position:relative;overflow:hidden}

/* Hero */
.hero{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--hero-bg)}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0}
.hero-overlay{position:absolute;inset:0;background:var(--hero-overlay);z-index:1}
.hero-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:2}
.hero-content{position:relative;z-index:3;text-align:center;color:var(--hero-text);padding:0 20px}
.hero-content h1{font-size:var(--hero-h1-size);font-weight:800;margin-bottom:20px;text-shadow:var(--hero-text-shadow);letter-spacing:3px;opacity:0;animation:fadeUp .8s .3s forwards}
.hero-content p{font-size:var(--hero-p-size);opacity:0;color:var(--hero-sub-text);max-width:650px;margin:0 auto;text-shadow:0 1px 10px rgba(0,0,0,.5);animation:fadeUp .8s .6s forwards}
.hero-scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:3;color:var(--hero-text);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:bounce 2s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(10px)}}

/* 分类区块 */
.category-section{width:100%;min-height:100vh;display:flex;flex-direction:column;position:relative}
.category-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0}
.category-bg-overlay{position:absolute;inset:0;z-index:1}
.category-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:80px var(--section-padding) 60px}
.category-header{text-align:center;margin-bottom:48px}
.category-header h2{font-size:var(--section-h2-size);font-weight:800;margin-bottom:12px}
.category-header p{font-size:var(--section-p-size);opacity:.7}

/* 卡片 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px;width:100%;max-width:var(--content-max);margin:0 auto}
.card{background:var(--card-bg);border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--card-shadow);transition:all .35s ease;cursor:pointer}
.card:hover{transform:translateY(-8px);box-shadow:var(--card-hover-shadow)}
.card-cover{width:100%;height:200px;overflow:hidden;background:var(--card-cover-bg);display:flex;align-items:center;justify-content:center}
.card-cover img{width:100%;height:100%;object-fit:cover}
.card-body{padding:20px}
.card-tag{display:inline-block;padding:3px 12px;border-radius:14px;font-size:12px;font-weight:600;margin-bottom:10px;background:var(--card-tag-bg);color:var(--card-tag-color)}
.card-title{font-size:var(--card-title-size);font-weight:700;color:var(--card-title-color);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card-desc{font-size:14px;color:var(--card-desc-color);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;line-height:1.6}
.card-meta{font-size:13px;color:var(--card-meta-color);display:flex;align-items:center;justify-content:space-between}

/* 关于我们 */
.about-section{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px var(--section-padding);position:relative}
.about-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.about-bg-overlay{position:absolute;inset:0;background:rgba(255,255,255,.93)}
.about-inner{position:relative;z-index:2;max-width:var(--content-max);width:100%}
.about-inner h1{font-size:var(--section-h2-size);color:var(--text-color);margin-bottom:24px;text-align:center}
.about-inner p{font-size:16px;color:var(--text-secondary);line-height:2;margin-bottom:16px;text-indent:2em}
.about-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-top:36px}
.about-feature{text-align:center;padding:28px 16px;background:var(--about-feat-bg);border-radius:14px;transition:transform .3s}
.about-feature:hover{transform:translateY(-4px)}
.about-feature .icon{font-size:36px;margin-bottom:12px}
.about-feature h3{font-size:16px;color:var(--text-color);margin-bottom:6px}
.about-feature p{font-size:13px;color:var(--text-secondary);text-indent:0;margin-bottom:0}

/* 联系我们 */
.contact-section{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px var(--section-padding);position:relative}
.contact-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.contact-bg-overlay{position:absolute;inset:0;background:rgba(10,22,40,.85)}
.contact-inner{position:relative;z-index:2;max-width:var(--content-max);width:100%;text-align:center;color:var(--hero-text)}
.contact-inner h1{font-size:var(--section-h2-size);margin-bottom:12px}
.contact-inner .contact-sub{font-size:16px;opacity:.7;margin-bottom:48px}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:28px}
.contact-item{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:32px 20px;transition:transform .3s,background .3s}
.contact-item:hover{transform:translateY(-4px);background:rgba(255,255,255,.12)}
.contact-item .c-icon{font-size:40px;margin-bottom:16px}
.contact-item h3{font-size:16px;margin-bottom:8px;color:var(--accent-color)}
.contact-item p{font-size:14px;opacity:.8;line-height:1.6}

/* 视频 */
.video-section{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px var(--section-padding);position:relative}
.video-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.video-bg-overlay{position:absolute;inset:0;background:rgba(10,22,40,.85)}
.video-inner{position:relative;z-index:2;max-width:1000px;width:100%;text-align:center;color:var(--hero-text)}
.video-inner h2{font-size:var(--section-h2-size);font-weight:800;margin-bottom:12px}
.video-inner>p{font-size:16px;opacity:.7;margin-bottom:40px}
.video-player{width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.video-player iframe,.video-player video{width:100%;height:100%;border:none}

/* 自定义区块 */
.custom-section{width:100%;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.custom-section-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0}
.custom-section-overlay{position:absolute;inset:0;z-index:1;background:rgba(10,22,40,.8)}
.custom-section-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:80px var(--section-padding) 60px;align-items:center;justify-content:center}
.custom-section-inner h2{font-size:var(--section-h2-size);font-weight:800;color:#fff;margin-bottom:12px;text-align:center}
.custom-section-inner>p{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:40px;text-align:center;max-width:700px}
.custom-section-content{max-width:var(--content-max);width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px}

/* 页脚 */
.footer{background:var(--footer-bg);color:var(--footer-text)}
.footer-container{max-width:var(--content-max);margin:0 auto;padding:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:32px}
.footer-col h3{color:var(--footer-heading);font-size:16px;margin-bottom:16px}
.footer-col p{font-size:14px;line-height:1.8}
.footer-col a{display:block;font-size:14px;padding:3px 0;transition:color .3s}
.footer-col a:hover{color:var(--accent-color)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);text-align:center;padding:16px 40px;font-size:13px}
.footer-admin-link{color:rgba(255,255,255,.2);font-size:12px;cursor:pointer;transition:color .3s}
.footer-admin-link:hover{color:rgba(255,255,255,.5)}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,.75);color:#fff;padding:10px 28px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 详情浮层 */
.detail-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:20px}
.detail-overlay.active{display:flex}
.detail-panel{background:#fff;border-radius:16px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;padding:40px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeUp .3s ease}
.detail-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;background:#f5f5f5;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:#e8e8e8}
.detail-category{display:inline-block;padding:4px 14px;border-radius:16px;font-size:13px;font-weight:600;margin-bottom:16px}
.detail-title{font-size:28px;font-weight:800;color:#1a2a4a;line-height:1.4;margin-bottom:12px}
.detail-meta{font-size:13px;color:#999;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #eee}
.detail-cover-img{width:100%;max-height:360px;object-fit:cover;border-radius:12px;margin-bottom:28px}
.detail-content{font-size:16px;line-height:1.9;color:#444}
.detail-content p{margin-bottom:16px}
.detail-content h3{margin:24px 0 12px;color:#1a2a4a}

@media(max-width:768px){
.hamburger{display:flex}
.nav-links.open{display:flex;flex-direction:column;position:absolute;top:var(--nav-height);left:0;right:0;background:rgba(10,22,40,.98);padding:12px 20px;gap:4px}
.nav-container{padding:0 16px}
.hero-content h1{font-size:32px!important}
.hero-content p{font-size:16px}
.card-grid{grid-template-columns:1fr;gap:20px}
.category-inner,.custom-section-inner{padding:72px 20px 48px}
.category-header h2,.custom-section-inner h2{font-size:28px!important}
.about-section,.contact-section,.video-section{padding:60px 20px}
.footer-container{padding:32px 20px}
.detail-panel{padding:24px 20px}
.detail-title{font-size:22px}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="scroll-indicator" id="scrollIndicator"></div>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <div class="nav-logo" id="navLogo"></div>
        <div class="nav-links" id="navLinks"></div>
        <div class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></div>
    </div>
</nav>

<section class="full-section hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <canvas class="hero-canvas" id="heroCanvas"></canvas>
    <div class="hero-content">
        <h1 id="heroH1">探索物联网的无限可能</h1>
        <p id="heroP">连接万物，智创未来</p>
    </div>
    <div class="hero-scroll-hint"><span>向下滚动探索</span><span style="font-size:24px">&#9660;</span></div>
</section>

<div id="dynamicSections"></div>

<section class="full-section contact-section" id="contact">
    <div class="contact-bg" id="contactBg"></div>
    <div class="contact-bg-overlay"></div>
    <div class="contact-inner">
        <h1 id="contactH1">&#128222; 联系我们</h1>
        <p class="contact-sub" id="contactSub">有任何问题或建议，欢迎随时与我们取得联系</p>
        <div class="contact-grid" id="contactGrid"></div>
    </div>
</section>

<section class="full-section about-section" id="about">
    <div class="about-bg" id="aboutBg"></div>
    <div class="about-bg-overlay"></div>
    <div class="about-inner">
        <h1 id="aboutH1">&#127758; 关于 IoT资讯</h1>
        <div id="aboutContent"></div>
        <div class="about-features" id="aboutFeatures"></div>
    </div>
</section>

<footer class="footer" id="footer"></footer>

<div class="detail-overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
    <div class="detail-panel" onclick="event.stopPropagation()">
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div id="detailBody"></div>
    </div>
</div>

<script>
const STORAGE_KEY='iot_news_data';
const SITE_CONFIG_KEY='iot_site_config';
const CATEGORY_MAP={
    'news':{label:'行业资讯',cssClass:'tag-news',icon:'\u{1F4F0}'},
    'tech':{label:'技术干货',cssClass:'tag-tech',icon:'\u{1F527}'},
    'projects':{label:'项目案例',cssClass:'tag-project',icon:'\u{1F3AF}‍\u{1F4BB}'},
    'resources':{label:'学习资源',cssClass:'tag-resource',icon:'\u{1F4D8}️'}
};

function getAllData(){const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):initDemoData()}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function getSiteConfig(){const r=localStorage.getItem(SITE_CONFIG_KEY);return r?JSON.parse(r):initConfig()}
function saveSiteConfig(c){localStorage.setItem(SITE_CONFIG_KEY,JSON.stringify(c))}
function initConfig(){const c={siteName:'IoT资讯',siteDesc:'物联网工程专业门户',navBg:'#0a1628',navText:'rgba(255,255,255,0.8)',navHoverBg:'rgba(0,180,255,0.2)',navActiveText:'#fff',logoIcon:'\u{1F4E1}',logoImg:'',heroBgImg:'',heroOverlay:'rgba(10,22,40,0.55)',heroH1:'探索物联网的无限可能',heroP:'连接万物，智创未来 — 汇聚行业前沿动态、技术干货、项目案例与学习资源',heroText:'#fff',heroTextShadow:'0 2px 30px rgba(0,0,0,0.5)',heroH1Size:'52px',heroPSize:'20px',heroCanvas:true,newsBgImg:'',newsBgOverlay:'rgba(240,242,245,0.92)',newsBg:'linear-gradient(135deg,#e8f0fe,#f0f4f8)',newsH2:'',newsSub:'',newsBgImg:'',techBgImg:'',techBgOverlay:'rgba(10,22,40,0.88)',techBg:'linear-gradient(135deg,#0a1628,#1a2a4a)',techH2:'',techSub:'',projectsBgImg:'',projectsBgOverlay:'rgba(240,242,245,0.92)',projectsBg:'linear-gradient(135deg,#e8f0fe,#f0f4f8)',projectsH2:'',projectsSub:'',resourcesBgImg:'',resourcesBgOverlay:'rgba(10,22,40,0.88)',resourcesBg:'linear-gradient(135deg,#0a1628,#1a2a4a)',resourcesH2:'',resourcesSub:'',contactBgImg:'',contactBgOverlay:'rgba(10,22,40,0.85)',contactH1:'\u{1F4F1} 联系我们',contactSub:'有任何问题或建议，欢迎随时与我们取得联系',contactEmail:'',contactPhone:'',contactAddress:'',contactWechat:'',aboutBgImg:'',aboutH1:'\u{1F30D} 关于 '+SITE_CONFIG_DEFAULT.siteName(),aboutContent:'',aboutFeatures:[],footerBg:'#0a1628',footerText:'rgba(255,255,255,0.6)',footerHeading:'#fff',footerCols:[],videos:[],customSections:[],colors:{primary:'#0066ff',accent:'#00d4ff',cardBg:'#fff',cardRadius:'16px',cardShadow:'0 4px 16px rgba(0,0,0,0.06)',cardHoverShadow:'0 16px 40px rgba(0,0,0,0.12)',cardTitleColor:'#1a2a4a',cardDescColor:'#888',cardMetaColor:'#bbb',cardTagBg:'#e6f7ff',cardTagColor:'#0066cc',textSecondary:'#555',bodyBg:'#f0f2f5',fontBody:'-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif'},
    defaultNewsLabel:'追踪物联网产业发展动态与市场趋势',defaultTechLabel:'深入解析物联网核心技术与实践指南',defaultProjectsLabel:'真实物联网项目方案与实战经验',defaultResourcesLabel:'精选课程、书籍与工具推荐'};
    saveSiteConfig(c);return c}

function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function genId(){return'item_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}

function makeCover(cat,c1,c2){const c=CATEGORY_MAP[cat]||CATEGORY_MAP.tech;const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:${c1}"/><stop offset="100%" style="stop-color:${c2}"/></linearGradient></defs><rect fill="url(#g)" width="400" height="240"/><text x="200" y="100" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="40">${c.icon}</text><text x="200" y="150" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-family="sans-serif">${c.label}</text></svg>`;return'data:image/svg+xml,'+encodeURIComponent(svg)}

function createCard(item,dark){
    const cat=CATEGORY_MAP[item.category]||CATEGORY_MAP.tech;
    const coverSrc=item.cover||makeCover(item.category,'#e3f2fd','#bbdefb');
    const cls=dark?'card card-dark':'card';
    return`<div class="${cls}" onclick="openDetail('${item.id}')"><div class="card-cover"><img src="${coverSrc}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:40px;color:#999>'+'${cat.icon}'+'</span>'"></div><div class="card-body"><span class="card-tag ${cat.cssClass}">${cat.label}</span><h3 class="card-title">${escapeHtml(item.title)}</h3><p class="card-desc">${escapeHtml(item.summary||'')}</p><div class="card-meta"><span>${item.publishDate||'未知日期'}</span><span>&#128065; 阅读</span></div></div></div>`}

// ===== 全局渲染 =====
function renderAll(){
    const data=getAllData();
    const cfg=getSiteConfig();
    applyGlobalStyles(cfg);
    renderNav(cfg);
    renderDynamicSections(data,cfg);
    renderFooter(cfg);
    startTechArt(cfg);
    updateActiveNav()}

function applyGlobalStyles(cfg){
    const c=cfg.colors||{};
    const root=document.documentElement;
    root.style.setProperty('--font-body',c.fontBody||cfg.fontBody||'-apple-system,sans-serif');
    root.style.setProperty('--body-bg',c.bodyBg||'#f0f2f5');
    root.style.setProperty('--text-color','#1a2a4a');
    root.style.setProperty('--text-secondary',c.textSecondary||'#555');
    root.style.setProperty('--accent-color',c.accent||'#00d4ff');
    root.style.setProperty('--accent-gradient',`linear-gradient(135deg,${c.primary||'#00b4ff'},${c.accent||'#0066ff'})`);
    root.style.setProperty('--content-max','1200px');
    root.style.setProperty('--section-padding','40px');
    root.style.setProperty('--nav-height','64px');
    root.style.setProperty('--nav-bg',cfg.navBg||'rgba(10,22,40,0.92)');
    root.style.setProperty('--nav-text',cfg.navText||'rgba(255,255,255,0.8)');
    root.style.setProperty('--nav-hover-bg',cfg.navHoverBg||'rgba(0,180,255,0.2)');
    root.style.setProperty('--nav-active-text',cfg.navActiveText||'#fff');
    root.style.setProperty('--nav-shadow','0 2px 16px rgba(0,0,0,0.25)');
    root.style.setProperty('--hero-bg',cfg.heroBgImg?`url("${cfg.heroBgImg}")`:'#0a1628');
    root.style.setProperty('--hero-overlay',cfg.heroOverlay||'rgba(10,22,40,0.55)');
    root.style.setProperty('--hero-text',cfg.heroText||'#fff');
    root.style.setProperty('--hero-text-shadow',cfg.heroTextShadow||'0 2px 30px rgba(0,0,0,0.5)');
    root.style.setProperty('--hero-h1-size',cfg.heroH1Size||'52px');
    root.style.setProperty('--hero-p-size',cfg.heroPSize||'20px');
    root.style.setProperty('--section-h2-size','36px');
    root.style.setProperty('--section-p-size','16px');

// ===== Canvas 科技艺术 =====
let canvasRunning=false;
function startTechArt(cfg){
    if(!cfg||!cfg.heroCanvas)return;
    const canvas=document.getElementById('heroCanvas');
    if(!canvas)return;
    canvasRunning=true;
    const ctx=canvas.getContext('2d');
    let w,h,nodes,mouse;
    function resize(){w=canvas.width=canvas.offsetWidth*devicePixelRatio;h=canvas.height=canvas.offsetHeight*devicePixelRatio}
    resize();
    function createNodes(){nodes=[];const cw=w/devicePixelRatio,ch=h/devicePixelRatio;const cols=Math.floor(cw/80),rows=Math.floor(ch/80);for(let i=0;i<cols*rows;i++){nodes.push({x:Math.random()*cw,y:Math.random()*ch,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:1.5+Math.random()*2,pulse:Math.random()*Math.PI*2})}}
    createNodes();mouse={x:-9999,y:-9999};
    canvas.onmousemove=e=>{const r=canvas.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top};
    canvas.onmouseleave=()=>{mouse.x=-9999;mouse.y=-9999};
    window.addEventListener('resize',()=>{resize();createNodes()});
    function animate(){if(!canvasRunning)return;const cw=w/devicePixelRatio,ch=h/devicePixelRatio;ctx.clearRect(0,0,cw,ch);const maxD=120;for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<maxD){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle=`rgba(0,212,255,${(1-d/maxD)*.3})`;ctx.lineWidth=.5;ctx.stroke()}}
    nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.pulse+=.02;if(n.x<0||n.x>cw)n.vx*=-1;if(n.y<0||n.y>ch)n.vy*=-1;const mx=n.x-mouse.x,my=n.y-mouse.y,md=Math.sqrt(mx*mx+my*my);if(md<150){n.x+=mx/md*2;n.y+=my/md*2}const pr=n.r+Math.sin(n.pulse)*.8,ga=.3+Math.sin(n.pulse)*.2;const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,pr*4);g.addColorStop(0,`rgba(0,212,255,${ga})`);g.addColorStop(1,'rgba(0,212,255,0)');ctx.beginPath();ctx.arc(n.x,n.y,pr*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,pr,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${.6+Math.sin(n.pulse)*.3})`;ctx.fill()});
    const sy=(Date.now()%3000)/3000*ch;const sg=ctx.createLinearGradient(0,sy-30,0,sy+30);sg.addColorStop(0,'rgba(0,212,255,0)');sg.addColorStop(.5,'rgba(0,212,255,.05)');sg.addColorStop(1,'rgba(0,212,255,0)');ctx.fillStyle=sg;ctx.fillRect(0,sy-30,cw,60);requestAnimationFrame(animate)}
    animate()}
function stopTechArt(){canvasRunning=false}

function updateActiveNav(){let current='hero';const sy=window.scrollY+100;sectionIds.forEach(id=>{const el=document.getElementById(id);if(el&&el.offsetTop<=sy)current=id});const dyn=document.getElementById('dynamicSections');if(dyn)dyn.querySelectorAll('.full-section[id]').forEach(el=>{if(el.offsetTop<=sy)current=el.id});document.querySelectorAll('.nav-links a').forEach(a=>{a.classList.toggle('active',a.dataset.target===current)});const st=document.getElementById('scrollIndicator');if(st){const dh=document.documentElement.scrollHeight-window.innerHeight;st.style.width=(dh>0?(window.scrollY/dh)*100:0)+'%'}}
window.addEventListener('scroll',()=>{updateActiveNav();document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>10)});
