<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT资讯 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628,#1a2a4a,#0d2137);position:relative}
.login-page::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(0,180,255,.08),transparent 50%),radial-gradient(circle at 80% 20%,rgba(0,212,255,.08),transparent 50%)}
.login-box{position:relative;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px 40px;width:400px;max-width:90vw;text-align:center}
.login-box h1{color:#fff;font-size:28px;margin-bottom:8px}
.login-box .subtitle{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:36px}
.login-box .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#00d4ff,#0066ff);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px}
.form-group{margin-bottom:20px;text-align:left}
.form-group label{display:block;color:rgba(255,255,255,.7);font-size:14px;margin-bottom:8px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;transition:border-color .3s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#00b4ff}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,.3)}
.form-group select option{background:#1a2a4a;color:#fff}
.form-group textarea{resize:vertical;min-height:120px}
.btn-login{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#00b4ff,#0066ff);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.login-error{color:#ff6b6b;font-size:13px;margin-top:12px;min-height:20px}
.login-back{display:inline-block;margin-top:24px;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;transition:color .3s}
.login-back:hover{color:rgba(255,255,255,.7)}
.admin-page{display:none;min-height:100vh}
.admin-page.active{display:flex}
.sidebar{width:240px;background:linear-gradient(180deg,#0a1628,#132238);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar-header .s-icon{width:36px;height:36px;background:linear-gradient(135deg,#00d4ff,#0066ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-header h2{font-size:17px;font-weight:700}
.sidebar-nav{flex:1;padding:12px 0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:12px 24px;color:rgba(255,255,255,.6);font-size:14px;transition:all .2s;cursor:pointer}
.sidebar-nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
.sidebar-nav a.active{color:#00d4ff;background:rgba(0,180,255,.1);border-right:3px solid #00d4ff}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{width:100%;padding:10px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:transparent;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;transition:all .3s}
.btn-logout:hover{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.3);color:#ff6b6b}
.main-content{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.top-bar{background:#fff;padding:16px 32px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:20px;color:#1a2a4a}
.top-bar .admin-user{font-size:13px;color:#999}
.content-area{padding:28px 32px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card .stat-icon{font-size:28px;margin-bottom:12px}
.stat-card .stat-num{font-size:32px;font-weight:800;color:#1a2a4a}
.stat-card .stat-label{font-size:13px;color:#999;margin-top:4px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:12px}
.search-input{padding:8px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:220px;outline:none;transition:border-color .3s}
.search-input:focus{border-color:#0066ff}
.btn{padding:9px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#00b4ff,#0066ff);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-success{background:#52c41a;color:#fff}
.btn-success:hover{background:#45a818}
.btn-warning{background:#faad14;color:#fff}
.btn-warning:hover{background:#e09b12}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#e04345}
.btn-outline{background:#fff;border:1px solid #d9d9d9;color:#666}
.btn-outline:hover{border-color:#0066ff;color:#0066ff}
.btn-sm{padding:5px 12px;font-size:13px}
.table-wrapper{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:14px 16px;text-align:left;font-size:13px;font-weight:600;color:#666;border-bottom:1px solid #f0f0f0}
td{padding:14px 16px;font-size:14px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.table-empty{text-align:center;padding:48px 20px;color:#bbb;font-size:15px}
.tag-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600}
.tag-news{background:#e6f7ff;color:#0066cc}
.tag-tech{background:#f6ffed;color:#389e0d}
.tag-project{background:#fff7e6;color:#d46b08}
.tag-resource{background:#f9f0ff;color:#722ed1}
.actions-cell{display:flex;gap:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:900px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 28px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;color:#1a2a4a}
.modal-close{width:32px;height:32px;border:none;background:#f5f5f5;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e8e8e8}
.modal-body{padding:24px 28px}
.modal-body .form-group{margin-bottom:18px}
.modal-body .form-group label{color:#333;font-size:14px;font-weight:500;margin-bottom:6px}
.modal-body .form-group input,.modal-body .form-group select,.modal-body .form-group textarea{background:#fafafa;border:1px solid #d9d9d9;color:#333;border-radius:8px;padding:10px 14px}
.modal-body .form-group input:focus,.modal-body .form-group select:focus,.modal-body .form-group textarea:focus{border-color:#0066ff;background:#fff}
.modal-body .form-group input::placeholder,.modal-body .form-group textarea::placeholder{color:#bbb}
.modal-body .form-group select option{background:#fff;color:#333}
.modal-body textarea{min-height:160px;font-family:inherit;font-size:14px;line-height:1.7}
.modal-footer{padding:16px 28px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:12px}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,.75);color:#fff;padding:10px 28px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:rgba(82,196,26,.9)}
.toast.error{background:rgba(255,77,79,.9)}
.confirm-dialog{text-align:center;padding:20px 0}
.confirm-dialog .icon{font-size:48px;margin-bottom:16px}
.confirm-dialog h3{font-size:18px;margin-bottom:8px}
.confirm-dialog p{color:#888;font-size:14px;margin-bottom:24px}
.confirm-actions{display:flex;gap:12px;justify-content:center}
.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.config-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.config-card h3{font-size:16px;color:#1a2a4a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.config-card .form-group label{color:#555}
.config-card .form-group input{background:#fafafa;border:1px solid #d9d9d9;color:#333;border-radius:8px;padding:10px 14px}
.config-card .form-group input:focus{border-color:#0066ff;background:#fff}
.config-card .form-group input::placeholder{color:#bbb}
.preview-img{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-top:8px;display:none;border:1px solid #eee}
.preview-img.show{display:block}
.upload-area{border:2px dashed #d9d9d9;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .3s;background:#fafafa}
.upload-area:hover{border-color:#0066ff;background:#f0f7ff}
.upload-area .upload-icon{font-size:36px;margin-bottom:8px}
.upload-area .upload-text{font-size:14px;color:#888}
.upload-area .upload-hint{font-size:12px;color:#bbb;margin-top:4px}
.upload-preview{max-width:100%;max-height:200px;border-radius:8px;margin-top:12px;display:none}
.upload-preview.show{display:block}
.upload-remove{display:none;margin-top:8px;color:#ff4d4f;font-size:13px;cursor:pointer}
.upload-remove.show{display:inline}
.manage-item{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;display:flex;align-items:center;gap:16px}
.manage-item-info{flex:1}
.manage-item-info h4{font-size:15px;color:#1a2a4a;margin-bottom:4px}
.manage-item-info p{font-size:13px;color:#888}
.manage-item-actions{display:flex;gap:8px;flex-shrink:0}
.color-row{display:flex;align-items:center;gap:12px}
.color-row input[type=color]{width:48px;height:36px;border:1px solid #d9d9d9;border-radius:8px;cursor:pointer;padding:2px}
.color-row input[type=text]{flex:1}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab-btn{padding:8px 20px;border:1px solid #d9d9d9;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;transition:all .2s}
.tab-btn.active{background:linear-gradient(135deg,#00b4ff,#0066ff);color:#fff;border-color:transparent}
@media(max-width:768px){
.sidebar{width:60px;overflow:hidden}
.sidebar-header h2,.sidebar-nav a span,.sidebar-footer span{display:none}
.sidebar-nav a{justify-content:center;padding:14px 0}
.main-content{margin-left:60px}
.content-area{padding:20px 16px}
.top-bar{padding:12px 16px}
.toolbar{flex-direction:column;align-items:stretch}
.toolbar-left,.toolbar-right{flex-wrap:wrap}
.search-input{width:100%}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="login-page" id="loginPage">
<div class="login-box">
<div class="logo-icon">&#9776;</div>
<h1>IoT资讯管理后台</h1>
<p class="subtitle">请输入管理员账号和密码登录</p>
<form onsubmit="handleLogin(event)">
<div class="form-group"><label>用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="off"></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码"></div>
<button type="submit" class="btn-login">登 录</button>
</form>
<div class="login-error" id="loginError"></div>
<a class="login-back" href="index.html">&#8592; 返回前台首页</a>
</div>
</div>

<div class="admin-page" id="adminPage">
<aside class="sidebar">
<div class="sidebar-header"><div class="s-icon">&#9776;</div><h2>IoT资讯管理</h2></div>
<nav class="sidebar-nav">
<a class="active" data-tab="dashboard" onclick="switchTab('dashboard')">&#128200; <span>内容总览</span></a>
<a data-tab="all" onclick="switchTab('all')">&#128196; <span>全部内容</span></a>
<a data-tab="news" onclick="switchTab('news')">&#128240; <span>行业资讯</span></a>
<a data-tab="tech" onclick="switchTab('tech')">&#128187; <span>技术干货</span></a>
<a data-tab="projects" onclick="switchTab('projects')">&#128736;&#65039; <span>项目案例</span></a>
<a data-tab="resources" onclick="switchTab('resources')">&#128218;&#65039; <span>学习资源</span></a>
<a data-tab="visual" onclick="switchTab('visual')">&#127912; <span>视觉设计</span></a>
<a data-tab="site" onclick="switchTab('site')">&#127970; <span>网站设置</span></a>
<a data-tab="video" onclick="switchTab('video')">&#127909; <span>视频管理</span></a>
<a data-tab="sections" onclick="switchTab('sections')">&#128205; <span>部署区块</span></a>
</nav>
<div class="sidebar-footer"><button class="btn-logout" onclick="handleLogout()">&#128682; <span>退出登录</span></button></div>
</aside>
<div class="main-content">
<div class="top-bar"><h1 id="pageTitle">内容总览</h1><span class="admin-user">&#128100; 管理员</span></div>
<div class="content-area" id="contentArea"></div>
</div>
</div>

<div class="modal-overlay" id="editorModal">
<div class="modal">
<div class="modal-header"><h2 id="editorTitle">新增内容</h2><button class="modal-close" onclick="closeEditor()">&times;</button></div>
<div class="modal-body">
<input type="hidden" id="editId">
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">标题 *</label><input type="text" id="editTitle" placeholder="请输入内容标题" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></div>
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">分类 *</label><select id="editCategory" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"><option value="news">行业资讯</option><option value="tech">技术干货</option><option value="projects">项目案例</option><option value="resources">学习资源</option></select></div>
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">封面图</label>
<div class="upload-area" onclick="document.getElementById('coverFileInput').click()"><div class="upload-icon">&#128247;</div><div class="upload-text">点击上传封面图</div><div class="upload-hint">支持 JPG/PNG/GIF 格式</div><input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="handleCoverUpload(this)"></div>
<img class="upload-preview" id="coverPreview" alt="封面预览"><div class="upload-remove" id="coverRemove" onclick="removeCover()">&#128465; 移除图片</div>
</div>
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">内容摘要</label><textarea id="editSummary" rows="3" placeholder="请输入内容摘要（选填）" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></textarea></div>
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">正文内容 *</label><textarea id="editContent" rows="8" placeholder="支持HTML格式" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px;min-height:160px"></textarea></div>
<div class="form-group"><label style="color:#333;font-size:14px;font-weight:500;margin-bottom:6px;display:block">发布时间</label><input type="date" id="editDate" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></div>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeEditor()">取消</button><button class="btn btn-primary" onclick="saveItem()">&#128190; 保存</button></div>
</div>
</div>

<div class="modal-overlay" id="confirmModal">
<div class="modal" style="width:420px">
<div class="modal-header"><h2>确认删除</h2><button class="modal-close" onclick="closeConfirm()">&times;</button></div>
<div class="modal-body"><div class="confirm-dialog"><div class="icon">&#9888;&#65039;</div><h3>确定要删除这条内容吗？</h3><p id="confirmText">此操作不可撤销</p><div class="confirm-actions"><button class="btn btn-outline" onclick="closeConfirm()">取消</button><button class="btn btn-danger" id="confirmBtn" onclick="executeDelete()">确认删除</button></div></div></div>
</div>
</div>

<script>
// ===== 工具函数 =====
const STORAGE_KEY='iot_news_data';
const SITE_CONFIG_KEY='iot_site_config';
const CATEGORY_MAP={'news':{label:'行业资讯',cssClass:'tag-news',icon:'\u{1F4F0}'},'tech':{label:'技术干货',cssClass:'tag-tech',icon:'\u{1F527}'},'projects':{label:'项目案例',cssClass:'tag-project',icon:'\u{1F3AF}‍\u{1F4BB}'},'resources':{label:'学习资源',cssClass:'tag-resource',icon:'\u{1F4D8}️'}};
function getAllData(){const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):[]}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function getSiteConfig(){const r=localStorage.getItem(SITE_CONFIG_KEY);return r?JSON.parse(r):null}
function saveSiteConfig(c){localStorage.setItem(SITE_CONFIG_KEY,JSON.stringify(c))}
function genId(){return'item_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');setTimeout(()=>e.classList.remove('show'),2200)}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fileToBase64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(f)})}
async function compressImage(b64,mw,q){return new Promise(r=>{const im=new Image();im.onload=()=>{const cv=document.createElement('canvas');let w=im.width,h=im.height;if(w>mw){h=h*mw/w;w=mw}cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);r(cv.toDataURL('image/jpeg',q))};im.src=b64})}

// ===== 登录 =====
function checkLogin(){return sessionStorage.getItem('iot_admin_logged')==='true'}
function handleLogin(e){e.preventDefault();const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(u==='admin'&&p==='123456'){sessionStorage.setItem('iot_admin_logged','true');document.getElementById('loginPage').style.display='none';document.getElementById('adminPage').classList.add('active');switchTab('dashboard')}else{document.getElementById('loginError').textContent='用户名或密码错误，请重试'}}
function handleLogout(){sessionStorage.removeItem('iot_admin_logged');document.getElementById('adminPage').classList.remove('active');document.getElementById('loginPage').style.display='flex';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').textContent='';showToast('已安全退出')}
(function(){if(checkLogin()){document.getElementById('loginPage').style.display='none';document.getElementById('adminPage').classList.add('active');switchTab('dashboard')}})();

// ===== Tab =====
let currentTab='dashboard',deleteTargetId=null;
const TAB_TITLES={dashboard:'内容总览',all:'全部内容',news:'行业资讯',tech:'技术干货',projects:'项目案例',resources:'学习资源',visual:'视觉设计',site:'网站设置',video:'视频管理',sections:'部署区块'};
function switchTab(t){currentTab=t;document.querySelectorAll('.sidebar-nav a').forEach(a=>{a.classList.toggle('active',a.dataset.tab===t)});document.getElementById('pageTitle').textContent=TAB_TITLES[t]||'管理后台';if(t==='dashboard')renderDashboard();else if(t==='visual')renderVisualDesign();else if(t==='site')renderSiteConfig();else if(t==='video')renderVideoManage();else if(t==='sections')renderSectionsManage();else renderListTab(t)}

// ===== 仪表盘 =====
function renderDashboard(){const data=getAllData();const counts={};['news','tech','projects','resources'].forEach(c=>{counts[c]=data.filter(i=>i.category===c).length});const total=data.length;document.getElementById('contentArea').innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon">&#128196;</div><div class="stat-num">${total}</div><div class="stat-label">内容总数</div></div><div class="stat-card"><div class="stat-icon">&#128240;</div><div class="stat-num">${counts.news}</div><div class="stat-label">行业资讯</div></div><div class="stat-card"><div class="stat-icon">&#128187;</div><div class="stat-num">${counts.tech}</div><div class="stat-label">技术干货</div></div><div class="stat-card"><div class="stat-icon">&#128736;&#65039;</div><div class="stat-num">${counts.projects}</div><div class="stat-label">项目案例</div></div><div class="stat-card"><div class="stat-icon">&#128218;&#65039;</div><div class="stat-num">${counts.resources}</div><div class="stat-label">学习资源</div></div></div><div style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06)"><h3 style="font-size:16px;color:#1a2a4a;margin-bottom:16px">&#128187; 快捷操作</h3><div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-primary" onclick="openEditor(null,'news')">&#128228; 添加行业资讯</button><button class="btn btn-success" onclick="openEditor(null,'tech')">&#128228; 添加技术文章</button><button class="btn btn-warning" onclick="openEditor(null,'projects')">&#128228; 添加项目案例</button><button class="btn btn-outline" style="border-color:#722ed1;color:#722ed1" onclick="openEditor(null,'resources')">&#128228; 添加学习资源</button></div></div>`}

// ===== 列表 =====
function renderListTab(cat){const data=getAllData();const items=data.filter(i=>i.category===cat).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));const c=CATEGORY_MAP[cat];const l=c?c.label:cat;let h=`<div class="toolbar"><div class="toolbar-left"><input class="search-input" type="text" placeholder="搜索标题..." id="searchInput" oninput="filterTable()"></div><div class="toolbar-right"><button class="btn btn-primary" onclick="openEditor(null,'${cat}')">&#128228; 新增${l}</button></div></div><div class="table-wrapper"><table><thead><tr><th style="width:50px">#</th><th>标题</th><th style="width:90px">分类</th><th style="width:110px">发布时间</th><th style="width:130px">操作</th></tr></thead><tbody>`;if(!items.length)h+=`<tr><td colspan="5" class="table-empty">暂无${l}内容</td></tr>`;else items.forEach((it,idx)=>{h+=`<tr data-index="${idx}"><td>${idx+1}</td><td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(it.title)}">${escapeHtml(it.title)}</td><td><span class="tag-badge ${c.cssClass}">${c.icon} ${l}</span></td><td>${it.publishDate||'-'}</td><td><div class="actions-cell"><button class="btn btn-sm btn-primary" onclick="openEditor('${it.id}','${cat}')">&#9998; 编辑</button><button class="btn btn-sm btn-danger" onclick="showDeleteConfirm('${it.id}','${escapeHtml(it.title)}')">&#128465; 删除</button></div></td></tr>`});h+='</tbody></table></div>';document.getElementById('contentArea').innerHTML=h}
function filterTable(){const kw=document.getElementById('searchInput').value.toLowerCase();document.querySelectorAll('#tableBody tr[data-index]').forEach(r=>{const t=r.querySelector('td:nth-child(2)').textContent.toLowerCase();r.style.display=t.includes(kw)?'':'none'})}

// ===== 编辑器 =====
let currentCoverBase64='';
function openEditor(id,dc){const modal=document.getElementById('editorModal');const isEdit=!!id;document.getElementById('editorTitle').textContent=isEdit?'编辑内容':'新增内容';document.getElementById('editId').value=id||'';currentCoverBase64='';const ua=document.getElementById('coverUploadArea');const pv=document.getElementById('coverPreview');const rm=document.getElementById('coverRemove');ua.style.display='';pv.classList.remove('show');rm.classList.remove('show');if(isEdit){const data=getAllData();const item=data.find(i=>i.id===id);if(item){document.getElementById('editTitle').value=item.title;document.getElementById('editCategory').value=item.category;document.getElementById('editSummary').value=item.summary||'';document.getElementById('editContent').value=item.content||'';document.getElementById('editDate').value=item.publishDate||'';if(item.cover){pv.src=item.cover;pv.classList.add('show');pv.style.display='block';rm.classList.add('show');currentCoverBase64=item.cover}}}else{document.getElementById('editTitle').value='';document.getElementById('editCategory').value=dc||'news';document.getElementById('editSummary').value='';document.getElementById('editContent').value='';document.getElementById('editDate').value=new Date().toISOString().split('T')[0]}modal.classList.add('show')}
function closeEditor(){document.getElementById('editorModal').classList.remove('show');currentCoverBase64=''}
function handleCoverUpload(inp){const f=inp.files[0];if(!f)return;fileToBase64(f).then(b=>compressImage(b,800,.7)).then(c=>{currentCoverBase64=c;const pv=document.getElementById('coverPreview');pv.src=c;pv.classList.add('show');pv.style.display='block';document.getElementById('coverRemove').classList.add('show');document.getElementById('coverUploadArea').style.display='none'})}
function removeCover(){currentCoverBase64='';const pv=document.getElementById('coverPreview');pv.classList.remove('show');pv.style.display='none';document.getElementById('coverRemove').classList.remove('show');document.getElementById('coverUploadArea').style.display='';document.getElementById('coverFileInput').value=''}
async function saveItem(){const id=document.getElementById('editId').value,title=document.getElementById('editTitle').value.trim(),cat=document.getElementById('editCategory').value,summary=document.getElementById('editSummary').value.trim(),content=document.getElementById('editContent').value.trim(),pd=document.getElementById('editDate').value;if(!title){showToast('请输入标题','error');return}if(!content){showToast('请输入正文内容','error');return}const data=getAllData();if(id){const idx=data.findIndex(i=>i.id===id);if(idx!==-1){data[idx].title=title;data[idx].category=cat;data[idx].cover=currentCoverBase64;data[idx].summary=summary;data[idx].content=content;data[idx].publishDate=pd;showToast('修改成功！前台刷新即可查看','success')}}else{data.push({id:genId(),category:cat,title,cover:currentCoverBase64,summary,content,publishDate:pd,createdAt:Date.now()});showToast('添加成功！前台刷新即可查看','success')}saveData(data);closeEditor();switchTab(currentTab)}

// ===== 删除 =====
function showDeleteConfirm(id,title){deleteTargetId=id;document.getElementById('confirmText').textContent=`"${title}" 将被永久删除`;document.getElementById('confirmModal').classList.add('show')}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show');deleteTargetId=null}
function executeDelete(){if(!deleteTargetId)return;let data=getAllData();data=data.filter(i=>i.id!==deleteTargetId);saveData(data);showToast('删除成功！','success');closeConfirm();switchTab(currentTab)}

        <div class="config-card"><h3>&#127912; 导航栏颜色</h3><div class="form-group"><label style="color:#555;font-size:13px">背景色</label><div class="color-row"><input type="color" id="navBgColor" value="${rgbToHex(cfg.navBg)||'#0a1628'}"><input type="text" id="navBg" value="${cfg.navBg||'rgba(10,22,40,0.92)'}" style="flex:1"></div></div><div class="form-group"><label style="color:#555;font-size:13px">文字颜色</label><div class="color-row"><input type="color" id="navTextColor" value="${rgbToHex(cfg.navText)||'rgba(255,255,255,0.8)'}"><input type="text" id="navText" value="${cfg.navText||'rgba(255,255,255,0.8)'}" style="flex:1"></div></div><div class="form-group"><label style="color:#555;font-size:13px">悬停背景</label><div class="color-row"><input type="color" id="navHoverColor" value="${rgbToHex(cfg.navHoverBg)||'rgba(0,180,255,0.2)'}"><input type="text" id="navHoverBg" value="${cfg.navHoverBg||'rgba(0,180,255,0.2)'}" style="flex:1"></div></div></div>
        </div></div>`;
    }
    return h;
}

// ===== 颜色工具 =====
function hexToRgb(hex){if(!hex)return'#fff';if(hex.startsWith('#')){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`}return hex}
function rgbToHex(rgba){if(!rgba)return'#000000';if(rgba.startsWith('#'))return rgba;const m=rgba.match(/(\d+)/g);if(!m||m.length<3)return'#000000';return'#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('')}

// ===== 上传处理 =====
let uploadCache={};
function handleUpload(input,previewId){
    const f=input.files[0];if(!f)return;
    fileToBase64(f).then(b=>compressImage(b,1600,.75)).then(c=>{
        uploadCache[previewId.replace('Prev','')]=c;
        const p=document.getElementById(previewId);
        if(p){p.src=c;p.classList.add('show');p.style.display='block'}
        const rm=p?p.nextElementSibling:null;
        if(rm)rm.classList.add('show');
    });
}
function removeUpload(key,previewId,el){
    uploadCache[key]='';
    const p=document.getElementById(previewId);
    if(p){p.style.display='none';p.classList.remove('show')}
    if(el)el.classList.remove('show');
}

// ===== 保存视觉设计 =====

    cfg.heroSubText=val('heroSubColorT',cfg.heroSubText||'rgba(255,255,255,0.9)');
    cfg.heroCanvas=document.getElementById('heroCanvas')?.checked!==false;
    // 上传缓存
    ['heroBgImg','newsBgImg','techBgImg','projectsBgImg','resourcesBgImg','contactBgImg','aboutBgImg'].forEach(k=>{

    cfg.contactAddress=val('contactAddress');

    cfg.contactBgImg=uploadCache.contactBgImg||cfg.contactBgImg||'';
    // Footer
    cfg.footerBg=val('footerBg');
    cfg.footerText=val('footerText');
    cfg.footerHeading=val('footerHeading');
    try{cfg.footerCols=JSON.parse(val('footerCols','[]'))}catch(e){cfg.footerCols=[]}
    // Nav
    cfg.siteName=val('siteName','IoT资讯');

    cfg.logoImg=uploadCache.logoImg||cfg.logoImg||'';
    cfg.navBg=val('navBg');

    cfg.navHoverBg=val('navHoverBg');
    saveSiteConfig(cfg);
    showToast('视觉设计已保存！前台刷新即可看到效果','success');

// ===== 视频管理 =====
function renderVideoManage(){
    const cfg=getSiteConfig()||{};
    const videos=cfg.videos||[];
    let lh='';
    videos.forEach((v,i)=>{
        lh+=`<div class="manage-item"><div class="manage-item-info"><h4>${escapeHtml(v.title||'未命名视频')}</h4><p>类型: ${v.embedUrl?'嵌入链接':(v.videoUrl?'视频文件':'占位')}</p></div><div class="manage-item-actions"><button class="btn btn-sm btn-warning" onclick="editVideo(${i})">&#9998; 编辑</button><button class="btn btn-sm btn-danger" onclick="delVideo(${i})">&#128465; 删除</button></div></div>`;
    });
    document.getElementById('contentArea').innerHTML=`
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div><h3 style="font-size:18px;color:#1a2a4a">&#127909; 视频展示管理</h3><p style="font-size:14px;color:#888">管理前台视频展示区块</p></div>
        <button class="btn btn-primary" onclick="openVideoEditor()">&#128228; 添加视频</button>
    </div>${lh||'<p style="text-align:center;color:#999;padding:40px">暂无视频</p>'}`;
}
function openVideoEditor(idx){
    const cfg=getSiteConfig()||{};const v=(cfg.videos||[])[idx]||{};
    document.getElementById('contentArea').innerHTML=`
    <h3 style="font-size:18px;color:#1a2a4a;margin-bottom:20px">&#127909; ${idx!==undefined?'编辑':'添加'}视频</h3>
    <div style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06);max-width:600px">
        <div class="form-group"><label style="color:#333;font-size:14px;font-weight:500">视频标题 *</label><input type="text" id="vid_title" value="${escapeHtml(v.title||'')}" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></div>
        <div class="form-group"><label style="color:#333;font-size:14px;font-weight:500">嵌入链接</label><input type="text" id="vid_embed" placeholder="B站/YouTube 嵌入地址" value="${escapeHtml(v.embedUrl||'')}" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></div>
        <div style="text-align:right;margin-top:20px"><button class="btn btn-outline" onclick="renderVideoManage()" style="margin-right:8px">取消</button><button class="btn btn-primary" onclick="saveVideo(${idx!==undefined?idx:-1})">&#128190; 保存</button></div>
    </div>`;
}
function editVideo(i){openVideoEditor(i)}
function saveVideo(idx){
    const cfg=getSiteConfig();if(!cfg.videos)cfg.videos=[];
    const v={title:document.getElementById('vid_title').value.trim(),embedUrl:document.getElementById('vid_embed').value.trim()};
    if(!v.title){showToast('请输入视频标题','error');return}
    if(idx>=0){v.createdAt=cfg.videos[idx].createdAt;cfg.videos[idx]=v}else{v.id=genId();v.createdAt=new Date().toLocaleDateString();cfg.videos.push(v)}
    saveSiteConfig(cfg);showToast('视频保存成功！','success');renderVideoManage();
}
function delVideo(i){const cfg=getSiteConfig();if(!cfg.videos)cfg.videos=[];cfg.videos.splice(i,1);saveSiteConfig(cfg);showToast('视频已删除','success');renderVideoManage()}

// ===== 自定义部署区块 =====
function renderSectionsManage(){
    const cfg=getSiteConfig()||{};const secs=cfg.customSections||[];

    document.getElementById('contentArea').innerHTML=`
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div><h3 style="font-size:18px;color:#1a2a4a">&#128205; 自定义部署区块</h3><p style="font-size:14px;color:#888">添加自定义全屏区块</p></div>

function openSectionEditor(idx){
    const cfg=getSiteConfig()||{};const secs=cfg.customSections||{};const s=(secs[idx])||{};
    document.getElementById('contentArea').innerHTML=`
    <h3 style="font-size:18px;color:#1a2a4a;margin-bottom:20px">&#128205; ${idx!==undefined?'编辑':'添加'}区块</h3>

        <div class="form-group"><label style="color:#333;font-size:14px;font-weight:500">副标题</label><input type="text" id="sec_subtitle" value="${escapeHtml(s.subtitle||'')}" style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px"></div>

        <div class="form-group"><label style="color:#333;font-size:14px;font-weight:500">背景图</label><div class="upload-area" onclick="document.getElementById('sec_bg_input').click()"><div class="upload-icon">&#128247;</div><div class="upload-text">点击上传</div><input type="file" id="sec_bg_input" accept="image/*" style="display:none" onchange="handleSectionBg(this)"></div><img class="upload-preview" id="sec_bg_prev" src="${s.backgroundImage||''}" style="${s.backgroundImage?'display:block':''}"><div class="upload-remove ${s.backgroundImage?'show':''}" onclick="removeSecBg()">&#128465; 移除</div></div>
        <div style="text-align:right;margin-top:20px"><button class="btn btn-outline" onclick="renderSectionsManage()" style="margin-right:8px">取消</button><button class="btn btn-primary" onclick="saveSection(${idx!==undefined?idx:-1})">&#128190; 保存</button></div>
    </div>`;
}
function editSection(i){openSectionEditor(i)}
let secBgTemp='';
function handleSectionBg(inp){const f=inp.files[0];if(!f)return;fileToBase64(f).then(b=>compressImage(b,1600,.7)).then(c=>{secBgTemp=c;const p=document.getElementById('sec_bg_prev');p.src=c;p.style.display='block';p.classList.add('show')})}
function removeSecBg(){secBgTemp='';const p=document.getElementById('sec_bg_prev');p.style.display='none';p.classList.remove('show')}
function saveSection(idx){
    const cfg=getSiteConfig();if(!cfg.customSections)cfg.customSections=[];
    const s={title:document.getElementById('sec_title').value.trim(),subtitle:document.getElementById('sec_subtitle').value.trim(),content:document.getElementById('sec_content').value.trim(),backgroundImage:secBgTemp||cfg.customSections[idx]?.backgroundImage||''};
    if(!s.title){showToast('请输入区块标题','error');return}
    if(idx>=0)cfg.customSections[idx]=s;else{cfg.customSections.push({...s,id:genId()})}
    saveSiteConfig(cfg);showToast('区块保存成功！前台刷新即可看到','success');renderSectionsManage();
}
function delSection(i){const cfg=getSiteConfig();if(!cfg.customSections)cfg.customSections=[];cfg.customSections.splice(i,1);saveSiteConfig(cfg);showToast('区块已删除','success');renderSectionsManage()}

// ESC
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEditor();closeConfirm()}});
</script>
