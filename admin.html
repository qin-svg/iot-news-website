<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT资讯 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5; color: #333; min-height: 100vh;
        }

        /* ========== 登录页 ========== */
        .login-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d2137 100%);
            position: relative;
        }
        .login-page::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 80%, rgba(0,180,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0,212,255,0.08) 0%, transparent 50%);
        }
        .login-box {
            position: relative; background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 48px 40px;
            width: 400px; max-width: 90vw; text-align: center;
        }
        .login-box h1 { color: #fff; font-size: 28px; margin-bottom: 8px; }
        .login-box .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 36px; }
        .login-box .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 14px; display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7);
            font-size: 14px; margin-bottom: 8px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
            background: rgba(255,255,255,0.08); color: #fff;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #00b4ff;
        }
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-group select option { background: #1a2a4a; color: #fff; }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #00b4ff, #0066ff);
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; min-height: 20px; }
        .login-back {
            display: inline-block; margin-top: 24px; color: rgba(255,255,255,0.4);
            font-size: 13px; cursor: pointer; transition: color 0.3s;
        }
        .login-back:hover { color: rgba(255,255,255,0.7); }

        /* ========== 管理后台 ========== */
        .admin-page { display: none; min-height: 100vh; }
        .admin-page.active { display: flex; }
        .sidebar {
            width: 240px; background: linear-gradient(180deg, #0a1628, #132238);
            color: #fff; display: flex; flex-direction: column;
            flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header .s-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }
        .sidebar-header h2 { font-size: 17px; font-weight: 700; }
        .sidebar-nav { flex: 1; padding: 12px 0; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 24px; color: rgba(255,255,255,0.6);
            font-size: 14px; transition: all 0.2s; cursor: pointer;
        }
        .sidebar-nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .sidebar-nav a.active {
            color: #00d4ff; background: rgba(0,180,255,0.1);
            border-right: 3px solid #00d4ff;
        }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout {
            width: 100%; padding: 10px;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            background: transparent; color: rgba(255,255,255,0.6);
            font-size: 14px; cursor: pointer; transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,107,107,0.15);
            border-color: rgba(255,107,107,0.3); color: #ff6b6b;
        }
        .main-content {
            margin-left: 240px; flex: 1;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .top-bar {
            background: #fff; padding: 16px 32px;
            border-bottom: 1px solid #e8e8e8;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .top-bar h1 { font-size: 20px; color: #1a2a4a; }
        .top-bar .admin-user { font-size: 13px; color: #999; }
        .content-area { padding: 28px 32px; flex: 1; }

        /* 统计 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 32px;
        }
        .stat-card {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-icon { font-size: 28px; margin-bottom: 12px; }
        .stat-card .stat-num { font-size: 32px; font-weight: 800; color: #1a2a4a; }
        .stat-card .stat-label { font-size: 13px; color: #999; margin-top: 4px; }

        /* 工具栏 */
        .toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .toolbar-left { display: flex; align-items: center; gap: 12px; }
        .toolbar-right { display: flex; align-items: center; gap: 12px; }
        .search-input {
            padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; width: 220px; outline: none; transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #0066ff; }

        /* 按钮 */
        .btn {
            padding: 9px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #00b4ff, #0066ff); color: #fff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-success:hover { background: #45a818; }
        .btn-warning { background: #faad14; color: #fff; }
        .btn-warning:hover { background: #e09b12; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-danger:hover { background: #e04345; }
        .btn-outline { background: #fff; border: 1px solid #d9d9d9; color: #666; }
        .btn-outline:hover { border-color: #0066ff; color: #0066ff; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }

        /* 表格 */
        .table-wrapper {
            background: #fff; border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #fafafa; padding: 14px 16px; text-align: left;
            font-size: 13px; font-weight: 600; color: #666;
            border-bottom: 1px solid #f0f0f0;
        }
        td {
            padding: 14px 16px; font-size: 14px;
            border-bottom: 1px solid #f5f5f5; vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbff; }
        .table-empty { text-align: center; padding: 48px 20px; color: #bbb; font-size: 15px; }
        .tag-badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 12px; font-weight: 600;
        }
        .tag-news { background: #e6f7ff; color: #0066cc; }
        .tag-tech { background: #f6ffed; color: #389e0d; }
        .tag-project { background: #fff7e6; color: #d46b08; }
        .tag-resource { background: #f9f0ff; color: #722ed1; }
        .actions-cell { display: flex; gap: 6px; }

        /* 模态框 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff; border-radius: 16px;
            width: 640px; max-width: 92vw; max-height: 90vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 20px 28px; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h2 { font-size: 18px; color: #1a2a4a; }
        .modal-close {
            width: 32px; height: 32px; border: none; background: #f5f5f5;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: #e8e8e8; }
        .modal-body { padding: 24px 28px; }
        .modal-body .form-group { margin-bottom: 18px; }
        .modal-body .form-group label {
            color: #333; font-size: 14px; font-weight: 500; margin-bottom: 6px;
        }
        .modal-body .form-group input,
        .modal-body .form-group select,
        .modal-body .form-group textarea {
            background: #fafafa; border: 1px solid #d9d9d9;
            color: #333; border-radius: 8px; padding: 10px 14px;
        }
        .modal-body .form-group input:focus,
        .modal-body .form-group select:focus,
        .modal-body .form-group textarea:focus {
            border-color: #0066ff; background: #fff;
        }
        .modal-body .form-group input::placeholder,
        .modal-body .form-group textarea::placeholder { color: #bbb; }
        .modal-body .form-group select option { background: #fff; color: #333; }
        .modal-body textarea { min-height: 160px; font-family: inherit; font-size: 14px; line-height: 1.7; }
        .modal-footer {
            padding: 16px 28px; border-top: 1px solid #f0f0f0;
            display: flex; justify-content: flex-end; gap: 12px;
        }

        /* Toast */
        .toast {
            position: fixed; top: 24px; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.75); color: #fff;
            padding: 10px 28px; border-radius: 8px;
            font-size: 14px; z-index: 9999;
            opacity: 0; transition: all 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: rgba(82,196,26,0.9); }
        .toast.error { background: rgba(255,77,79,0.9); }

        /* 确认对话框 */
        .confirm-dialog { text-align: center; padding: 20px 0; }
        .confirm-dialog .icon { font-size: 48px; margin-bottom: 16px; }
        .confirm-dialog h3 { font-size: 18px; margin-bottom: 8px; }
        .confirm-dialog p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .confirm-actions { display: flex; gap: 12px; justify-content: center; }

        /* 配置页面 */
        .config-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .config-card {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .config-card h3 {
            font-size: 16px; color: #1a2a4a; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .config-card .form-group label { color: #555; }
        .config-card .form-group input {
            background: #fafafa; border: 1px solid #d9d9d9;
            color: #333; border-radius: 8px; padding: 10px 14px;
        }
        .config-card .form-group input:focus {
            border-color: #0066ff; background: #fff;
        }
        .config-card .form-group input::placeholder { color: #bbb; }
        .preview-img {
            width: 100%; height: 120px; object-fit: cover;
            border-radius: 8px; margin-top: 8px; display: none;
            border: 1px solid #eee;
        }
        .preview-img.show { display: block; }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #d9d9d9; border-radius: 12px;
            padding: 24px; text-align: center; cursor: pointer;
            transition: all 0.3s; background: #fafafa;
        }
        .upload-area:hover { border-color: #0066ff; background: #f0f7ff; }
        .upload-area.dragover { border-color: #0066ff; background: #e6f0ff; }
        .upload-area .upload-icon { font-size: 36px; margin-bottom: 8px; }
        .upload-area .upload-text { font-size: 14px; color: #888; }
        .upload-area .upload-hint { font-size: 12px; color: #bbb; margin-top: 4px; }
        .upload-preview {
            max-width: 100%; max-height: 200px; border-radius: 8px;
            margin-top: 12px; display: none;
        }
        .upload-preview.show { display: block; }
        .upload-remove {
            display: none; margin-top: 8px; color: #ff4d4f;
            font-size: 13px; cursor: pointer;
        }
        .upload-remove.show { display: inline; }

        /* 管理列表项 */
        .manage-item {
            background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px;
            display: flex; align-items: center; gap: 16px;
        }
        .manage-item-info { flex: 1; }
        .manage-item-info h4 { font-size: 15px; color: #1a2a4a; margin-bottom: 4px; }
        .manage-item-info p { font-size: 13px; color: #888; }
        .manage-item-thumb {
            width: 80px; height: 60px; border-radius: 8px;
            object-fit: cover; background: #f0f0f0; flex-shrink: 0;
        }
        .manage-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { width: 60px; overflow: hidden; }
            .sidebar-header h2, .sidebar-nav a span, .sidebar-footer span { display: none; }
            .sidebar-nav a { justify-content: center; padding: 14px 0; }
            .main-content { margin-left: 60px; }
            .content-area { padding: 20px 16px; }
            .top-bar { padding: 12px 16px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left, .toolbar-right { flex-wrap: wrap; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ========== 登录页 ========== -->
<div class="login-page" id="loginPage">
    <div class="login-box">
        <div class="logo-icon">&#9776;</div>
        <h1>IoT资讯管理后台</h1>
        <p class="subtitle">请输入管理员账号和密码登录</p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="off">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPass" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <div class="login-error" id="loginError"></div>
        <a class="login-back" href="index.html">&#8592; 返回前台首页</a>
    </div>
</div>

<!-- ========== 管理后台 ========== -->
<div class="admin-page" id="adminPage">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="s-icon">&#9776;</div>
            <h2>IoT资讯管理</h2>
        </div>
        <nav class="sidebar-nav">
            <a class="active" data-tab="dashboard" onclick="switchTab('dashboard')">&#128200; <span>内容总览</span></a>
            <a data-tab="all" onclick="switchTab('all')">&#128196; <span>全部内容</span></a>
            <a data-tab="news" onclick="switchTab('news')">&#128240; <span>行业资讯</span></a>
            <a data-tab="tech" onclick="switchTab('tech')">&#128187; <span>技术干货</span></a>
            <a data-tab="projects" onclick="switchTab('projects')">&#128736;&#65039; <span>项目案例</span></a>
            <a data-tab="resources" onclick="switchTab('resources')">&#128218;&#65039; <span>学习资源</span></a>
            <a data-tab="site" onclick="switchTab('site')">&#127970; <span>网站设置</span></a>
            <a data-tab="video" onclick="switchTab('video')">&#127909; <span>视频管理</span></a>
            <a data-tab="sections" onclick="switchTab('sections')">&#128205; <span>部署区块</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="handleLogout()">&#128682; <span>退出登录</span></button>
        </div>
    </aside>

    <div class="main-content">
        <div class="top-bar">
            <h1 id="pageTitle">内容总览</h1>
            <span class="admin-user">&#128100; 管理员</span>
        </div>
        <div class="content-area" id="contentArea"></div>
    </div>
</div>

<!-- ========== 内容编辑模态框 ========== -->
<div class="modal-overlay" id="editorModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="editorTitle">新增内容</h2>
            <button class="modal-close" onclick="closeEditor()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="editTitle" placeholder="请输入内容标题">
            </div>
            <div class="form-group">
                <label>分类 *</label>
                <select id="editCategory">
                    <option value="news">行业资讯</option>
                    <option value="tech">技术干货</option>
                    <option value="projects">项目案例</option>
                    <option value="resources">学习资源</option>
                </select>
            </div>
            <div class="form-group">
                <label>封面图</label>
                <div class="upload-area" id="coverUploadArea" onclick="document.getElementById('coverFileInput').click()">
                    <div class="upload-icon">&#128247;</div>
                    <div class="upload-text">点击上传封面图</div>
                    <div class="upload-hint">支持 JPG/PNG/GIF 格式</div>
                    <input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="handleCoverUpload(this)">
                </div>
                <img class="upload-preview" id="coverPreview" alt="封面预览">
                <div class="upload-remove" id="coverRemove" onclick="removeCover()">&#128465; 移除图片</div>
            </div>
            <div class="form-group">
                <label>内容摘要</label>
                <textarea id="editSummary" rows="3" placeholder="请输入内容摘要（选填）"></textarea>
            </div>
            <div class="form-group">
                <label>正文内容 *</label>
                <textarea id="editContent" rows="8" placeholder="支持HTML格式，请输入正文内容"></textarea>
            </div>
            <div class="form-group">
                <label>发布时间</label>
                <input type="date" id="editDate">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeEditor()">取消</button>
            <button class="btn btn-primary" onclick="saveItem()">&#128190; 保存</button>
        </div>
    </div>
</div>

<!-- ========== 确认删除模态框 ========== -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal" style="width:420px;">
        <div class="modal-header">
            <h2>确认删除</h2>
            <button class="modal-close" onclick="closeConfirm()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="confirm-dialog">
                <div class="icon">&#9888;&#65039;</div>
                <h3>确定要删除这条内容吗？</h3>
                <p id="confirmText">此操作不可撤销</p>
                <div class="confirm-actions">
                    <button class="btn btn-outline" onclick="closeConfirm()">取消</button>
                    <button class="btn btn-danger" id="confirmBtn" onclick="executeDelete()">确认删除</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  工具函数
// ============================================================
const STORAGE_KEY = 'iot_news_data';
const SITE_CONFIG_KEY = 'iot_site_config';

const CATEGORY_MAP = {
    'news':     { label: '行业资讯', cssClass: 'tag-news',     icon: '\u{1F4F0}' },
    'tech':     { label: '技术干货', cssClass: 'tag-tech',     icon: '\u{1F527}' },
    'projects': { label: '项目案例', cssClass: 'tag-project',  icon: '\u{1F3AF}‍\u{1F4BB}' },
    'resources':{ label: '学习资源', cssClass: 'tag-resource', icon: '\u{1F4D8}️' },
};

function getAllData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
}
function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function genId() { return 'item_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }

function getSiteConfig() {
    const raw = localStorage.getItem(SITE_CONFIG_KEY);
    if (raw) return JSON.parse(raw);
    return {
        heroBg: '', newsBg: '', techBg: '', projectsBg: '', resourcesBg: '',
        contactBg: '', aboutBg: '',

function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => el.classList.remove('show'), 2200);
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// 文件转 base64
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// 限制 base64 长度（避免 localStorage 溢出）
function compressImage(base64, maxWidth, quality) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = base64;
    });
}

let currentCoverBase64 = '';

function openEditor(id, defaultCategory) {
    const modal = document.getElementById('editorModal');
    const isEdit = !!id;
    document.getElementById('editorTitle').textContent = isEdit ? '编辑内容' : '新增内容';
    document.getElementById('editId').value = id || '';
    currentCoverBase64 = '';

    // 重置上传区域
    const uploadArea = document.getElementById('coverUploadArea');
    const preview = document.getElementById('coverPreview');
    const removeBtn = document.getElementById('coverRemove');
    uploadArea.style.display = '';
    preview.classList.remove('show');
    preview.src = '';
    removeBtn.classList.remove('show');

    if (isEdit) {
        const data = getAllData();
        const item = data.find(i => i.id === id);
        if (item) {
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editCategory').value = item.category;
            document.getElementById('editSummary').value = item.summary || '';
            document.getElementById('editContent').value = item.content || '';
            document.getElementById('editDate').value = item.publishDate || '';
            if (item.cover) {
                preview.src = item.cover;
                preview.classList.add('show');
                preview.style.display = 'block';
                removeBtn.classList.add('show');
                currentCoverBase64 = item.cover;
            }
        }
    } else {
        document.getElementById('editTitle').value = '';
        document.getElementById('editCategory').value = defaultCategory || 'news';
        document.getElementById('editSummary').value = '';
        document.getElementById('editContent').value = '';
        document.getElementById('editDate').value = new Date().toISOString().split('T')[0];
    }

    modal.classList.add('show');
}

function closeEditor() {
    document.getElementById('editorModal').classList.remove('show');
    currentCoverBase64 = '';
}

function handleCoverUpload(input) {
    const file = input.files[0];
    if (!file) return;
    fileToBase64(file).then(base64 => {
        return compressImage(base64, 800, 0.7);
    }).then(compressed => {
        currentCoverBase64 = compressed;
        const preview = document.getElementById('coverPreview');
        preview.src = compressed;
        preview.classList.add('show');
        preview.style.display = 'block';
        document.getElementById('coverRemove').classList.add('show');
        document.getElementById('coverUploadArea').style.display = 'none';
    });
}

function removeCover() {
    currentCoverBase64 = '';
    const preview = document.getElementById('coverPreview');
    preview.classList.remove('show');
    preview.style.display = 'none';
    document.getElementById('coverRemove').classList.remove('show');
    document.getElementById('coverUploadArea').style.display = '';
    document.getElementById('coverFileInput').value = '';
}

async function saveItem() {
    const id = document.getElementById('editId').value;
    const title = document.getElementById('editTitle').value.trim();
    const category = document.getElementById('editCategory').value;
    const summary = document.getElementById('editSummary').value.trim();
    const content = document.getElementById('editContent').value.trim();
    const publishDate = document.getElementById('editDate').value;

    if (!title) { showToast('请输入标题', 'error'); return; }
    if (!content) { showToast('请输入正文内容', 'error'); return; }

    const data = getAllData();

    if (id) {
        const idx = data.findIndex(i => i.id === id);
        if (idx !== -1) {
            data[idx].title = title;
            data[idx].category = category;
            data[idx].cover = currentCoverBase64;
            data[idx].summary = summary;
            data[idx].content = content;
            data[idx].publishDate = publishDate;
            showToast('修改成功！前台刷新即可查看', 'success');
        }
    } else {
        data.push({
            id: genId(),
            category, title,
            cover: currentCoverBase64,
            summary, content, publishDate,
            createdAt: Date.now()
        });
        showToast('添加成功！前台刷新即可查看', 'success');
    }

    saveData(data);
    closeEditor();
    switchTab(currentTab);
}

// 处理背景图上传
async function handleBgUpload(key, file) {
    if (!file) return;
    try {
        const base64 = await fileToBase64(file);
        const compressed = await compressImage(base64, 1600, 0.75);
        const cfg = getSiteConfig();
        cfg[key] = compressed;
        saveSiteConfig(cfg);

        // 更新预览
        const preview = document.getElementById('prev_' + key);
        if (preview) {
            preview.src = compressed;
            preview.classList.add('show');
            preview.style.display = 'block';
        }
        const removeBtn = preview ? preview.nextElementSibling : null;
        if (removeBtn) removeBtn.classList.add('show');
        showToast('图片已保存', 'success');
    } catch(e) {
        showToast('图片上传失败', 'error');
    }
}

function removeBgImage(key) {
    const cfg = getSiteConfig();
    cfg[key] = '';
    saveSiteConfig(cfg);
    const preview = document.getElementById('prev_' + key);
    if (preview) { preview.style.display = 'none'; preview.classList.remove('show'); }
    const removeBtn = preview ? preview.nextElementSibling : null;
    if (removeBtn) removeBtn.classList.remove('show');
    showToast('图片已移除', 'success');
}

function saveSiteConfigData() {
    const cfg = getSiteConfig();
    cfg.email = document.getElementById('cfg_email').value.trim();
    cfg.phone = document.getElementById('cfg_phone').value.trim();
    cfg.address = document.getElementById('cfg_address').value.trim();

                <div class="manage-item-actions">
                    <button class="btn btn-sm btn-warning" onclick="editSection(${i})">&#9998; 编辑</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteSection(${i})">&#128465; 删除</button>
                </div>
            </div>`;
    });

    document.getElementById('contentArea').innerHTML = `
        <div style="margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
            <div>
                <h3 style="font-size:18px;color:#1a2a4a;">&#128205; 自定义部署区块</h3>
                <p style="font-size:14px;color:#888;">添加自定义全屏区块到前台页面，支持自定义标题、内容和背景图</p>
            </div>
            <button class="btn btn-primary" onclick="openSectionEditor()">&#128228; 添加区块</button>
        </div>
        ${listHtml || '<p style="text-align:center;color:#999;padding:40px;">暂无自定义区块，点击上方按钮添加</p>'}
    `;
}

function openSectionEditor(index) {
    const cfg = getSiteConfig();
    const sections = cfg.customSections || [];
    const s = index !== undefined ? sections[index] : {};

    document.getElementById('contentArea').innerHTML = `
        <h3 style="font-size:18px;color:#1a2a4a;margin-bottom:20px;">&#128205; ${index !== undefined ? '编辑区块' : '添加区块'}</h3>
        <div style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,0.06);max-width:700px;">
            <div class="form-group">
                <label style="color:#333;font-size:14px;font-weight:500;">区块标题 *</label>
                <input type="text" id="sec_title" placeholder="请输入区块标题" value="${escapeHtml(s.title || '')}"
                       style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px;">
            </div>
            <div class="form-group">
                <label style="color:#333;font-size:14px;font-weight:500;">副标题</label>
                <input type="text" id="sec_subtitle" placeholder="请输入副标题（选填）" value="${escapeHtml(s.subtitle || '')}"
                       style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px;">
            </div>
            <div class="form-group">
                <label style="color:#333;font-size:14px;font-weight:500;">内容（HTML）</label>
                <textarea id="sec_content" rows="6" placeholder="支持HTML格式，如卡片、文本等"
                          style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;background:#fafafa;font-size:14px;min-height:120px;">${escapeHtml(s.content || '')}</textarea>
            </div>
            <div class="form-group">
                <label style="color:#333;font-size:14px;font-weight:500;">背景图</label>
                <div class="upload-area" onclick="document.getElementById('sec_bg_input').click()">
                    <div class="upload-icon">&#128247;</div>
                    <div class="upload-text">点击上传背景图</div>
                    <input type="file" id="sec_bg_input" accept="image/*" style="display:none"
                           onchange="handleSectionBgUpload(this)">
                </div>
                <img class="upload-preview" id="sec_bg_preview" src="${s.backgroundImage || ''}" alt="预览"
                     style="${s.backgroundImage ? 'display:block' : ''}">
                <div class="upload-remove ${s.backgroundImage ? 'show' : ''}"
                     onclick="removeSectionBg()">&#128465; 移除图片</div>
            </div>
            <div style="text-align:right;margin-top:20px;">
                <button class="btn btn-outline" onclick="renderSectionsManage()" style="margin-right:8px;">取消</button>
                <button class="btn btn-primary" onclick="saveSection(${index !== undefined ? index : -1})">&#128190; 保存</button>
            </div>
        </div>
    `;
}

let sectionBgTemp = '';

function editSection(i) { sectionBgTemp = ''; openSectionEditor(i); }

function handleSectionBgUpload(input) {
    const file = input.files[0];
    if (!file) return;
    fileToBase64(file).then(base64 => {
        return compressImage(base64, 1600, 0.7);
    }).then(compressed => {
        sectionBgTemp = compressed;
        const preview = document.getElementById('sec_bg_preview');
        if (preview) { preview.src = compressed; preview.style.display = 'block'; preview.classList.add('show'); }
        const removeBtn = preview ? preview.nextElementSibling : null;
        if (removeBtn) removeBtn.classList.add('show');
    });
}

function removeSectionBg() {
    sectionBgTemp = '';
    const preview = document.getElementById('sec_bg_preview');
    if (preview) { preview.style.display = 'none'; preview.classList.remove('show'); }
    const removeBtn = preview ? preview.nextElementSibling : null;
    if (removeBtn) removeBtn.classList.remove('show');
}

function saveSection(index) {
    const cfg = getSiteConfig();
    if (!cfg.customSections) cfg.customSections = [];
    const s = {
        title: document.getElementById('sec_title').value.trim(),
        subtitle: document.getElementById('sec_subtitle').value.trim(),
        content: document.getElementById('sec_content').value.trim(),
        backgroundImage: sectionBgTemp || (cfg.customSections[index] || {}).backgroundImage || '',
    };
    if (!s.title) { showToast('请输入区块标题', 'error'); return; }

    if (index >= 0) {
        cfg.customSections[index] = s;
    } else {
        s.id = genId();
        cfg.customSections.push(s);
    }
    saveSiteConfig(cfg);
    showToast('区块保存成功！前台刷新即可看到', 'success');
    renderSectionsManage();
}

function deleteSection(i) {
    const cfg = getSiteConfig();
    if (!cfg.customSections) cfg.customSections = [];
    cfg.customSections.splice(i, 1);
    saveSiteConfig(cfg);
    showToast('区块已删除', 'success');
    renderSectionsManage();
}

// ESC 键关闭模态框
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeEditor();
        closeConfirm();
    }
});
</script>
</body>
</html>
